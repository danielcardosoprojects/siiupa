<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Crachá</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 15px;
}

.container {
    background: #ffffff;
    padding: 20px;
    max-width: 500px;
    margin: auto;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 14px;
    background: #007BFF;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:disabled {
    background: #7aa7e6;
}

.loading {
    text-align: center;
    margin-top: 15px;
    display: none;
}

.spinner {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #007BFF;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    margin: 10px auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.resultado {
    margin-top: 20px;
    padding: 15px;
    background: #eaf7ea;
    border-radius: 8px;
    display: none;
}

.resultado img {
    width: 120px;
    border-radius: 6px;
    margin-top: 10px;
}
.whatsapp-btn {
    display: block;
    width: 100%;
    max-width: 400px;
    margin: 20px auto;
    padding: 14px 18px;
    background-color: #25D366;
    color: white;
    text-align: center;
    text-decoration: none;
    font-weight: bold;
    border-radius: 8px;
    font-size: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    transition: 0.2s;
}

.whatsapp-btn:hover {
    background-color: #1ebe5d;
    transform: scale(1.02);
}

@media (max-width: 480px) {
    .whatsapp-btn {
        font-size: 14px;
        padding: 12px;
    }
}
</style>
</head>

<body>

<div class="container">
<h2>Cadastro para Crachá</h2>

<form id="crachaForm" enctype="multipart/form-data">
<input type="text" name="nome_completo" placeholder="Nome Completo" required>
<input type="text" name="nome_cracha" placeholder="Nome desejado no crachá" required>
<input type="text" name="cpf" id="cpf" placeholder="CPF" required>
<input type="text" name="telefone" id="telefone" placeholder="Telefone">
<input type="text" name="cargo" placeholder="Cargo" required>
<input type="file" name="foto" id="foto" accept="image/*" required>

<button type="submit" id="btnEnviar">Enviar Cadastro</button>
</form>

<div class="loading" id="loading">
<div class="spinner"></div>
<p>Enviando dados... Aguarde.</p>
</div>

<div class="resultado" id="resultado"></div>

</div>
<a href="https://wa.me/5591982310268" target="_blank" class="whatsapp-btn">
    Caso tenha algum problema, fale com Daniel no WhatsApp clicando aqui;
</a>
<script>

// Máscara CPF
document.getElementById('cpf').addEventListener('input', function(e){
    let v = e.target.value.replace(/\D/g,'');
    v = v.replace(/(\d{3})(\d)/,'$1.$2');
    v = v.replace(/(\d{3})(\d)/,'$1.$2');
    v = v.replace(/(\d{3})(\d{1,2})$/,'$1-$2');
    e.target.value = v;
});

// Máscara Telefone
document.getElementById('telefone').addEventListener('input', function(e){
    let v = e.target.value.replace(/\D/g,'');
    v = v.replace(/^(\d{2})(\d)/g,"($1) $2");
    v = v.replace(/(\d)(\d{4})$/,"$1-$2");
    e.target.value = v;
});

// Validação CPF
function validarCPF(cpf) {
    cpf = cpf.replace(/[^\d]+/g,'');
    if(cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;
    let soma = 0, resto;
    for (let i=1; i<=9; i++) soma += parseInt(cpf.substring(i-1, i)) * (11 - i);
    resto = (soma * 10) % 11;
    if (resto === 10 || resto === 11) resto = 0;
    if (resto !== parseInt(cpf.substring(9, 10))) return false;
    soma = 0;
    for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i-1, i)) * (12 - i);
    resto = (soma * 10) % 11;
    if (resto === 10 || resto === 11) resto = 0;
    if (resto !== parseInt(cpf.substring(10, 11))) return false;
    return true;
}

document.getElementById('crachaForm').addEventListener('submit', function(e){
    e.preventDefault();

    let cpf = document.getElementById('cpf').value;
    if(!validarCPF(cpf)){
        alert("CPF inválido!");
        return;
    }

    let btn = document.getElementById('btnEnviar');
    btn.disabled = true;

    document.getElementById('loading').style.display = "block";
    document.getElementById('resultado').style.display = "none";

    let formData = new FormData(this);
    let fotoInput = document.getElementById('foto');
    let fotoPreview = URL.createObjectURL(fotoInput.files[0]);

    fetch('upload.php', {
        method: 'POST',
        body: formData
    })
    .then(response => response.text())
    .then(data => {

        document.getElementById('loading').style.display = "none";
        btn.disabled = false;

        if(data.includes("sucesso")){
            document.getElementById('resultado').innerHTML = `
                <h3>Cadastro realizado com sucesso!</h3>
                <p><strong>Nome:</strong> ${formData.get('nome_completo')}</p>
                <p><strong>Nome no Crachá:</strong> ${formData.get('nome_cracha')}</p>
                <p><strong>CPF:</strong> ${formData.get('cpf')}</p>
                <p><strong>Cargo:</strong> ${formData.get('cargo')}</p>
                <img src="${fotoPreview}">
            `;
            document.getElementById('resultado').style.display = "block";
            document.getElementById('crachaForm').reset();
        } else {
            alert("Erro ao cadastrar.");
        }

    })
    .catch(() => {
        document.getElementById('loading').style.display = "none";
        btn.disabled = false;
        alert("Erro na comunicação com o servidor.");
    });
});
</script>

</body>
</html>
