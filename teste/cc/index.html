    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
      const showLoading = () => document.querySelector('.loading').style.display = 'block';
      const stopLoading = () => document.querySelector('.loading').style.display = 'none';

      const cpfParam = new URLSearchParams(window.location.search).get('cpf');
      if (cpfParam) document.getElementById("cpfInput").value = cpfParam.replace(/\D/g, "");

      async function obterToken() {
        const usuario = document.getElementById("usuarioInput").value;
        const senha = document.getElementById("senhaInput").value;
        try {
          const response = await axios.post("https://apionline.layoutsistemas.com.br/api/token/", {
            username: usuario, password: senha
          });
          document.getElementById("tokenInput").value = "Bearer " + response.data.access;
        } catch (e) { console.error(e); }
      }

      obterToken();

      document.getElementById("searchButton").addEventListener("click", async () => {
        const token = 'Bearer '+ document.getElementById("tokenInput").value;
        console.log('Token:', token);
        const exercicio = document.getElementById("exercicioInput").value;
        const matricula = document.getElementById("matriculaInput").value;
       
        const url = `https://apionline.layoutsistemas.com.br/api/contracheques/?matricula=${matricula}&entidade=796&exercicio=${exercicio}`;
        showLoading();
        try {
          const res = await axios.get(url, { headers: { Authorization: token } });
          const container = document.getElementById("cardsContainer");
          container.innerHTML = "";
          res.data.results.forEach(c => {
            const div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `<a href="#" data-id="${c.id}"><strong>${c.competencia_display}</strong> - ${c.tipo_descricao}</a>`;
            div.querySelector("a").onclick = async e => {
              e.preventDefault();
              const pdfUrl = `https://apionline.layoutsistemas.com.br/api/contra_cheques/relatorio/?contra_cheque=${c.id}&matricula=${matricula}`;
              const r = await axios.get(pdfUrl, { responseType: "arraybuffer", headers: { Authorization: token } });
              const blob = new Blob([r.data], { type: "application/pdf" });
              window.open(URL.createObjectURL(blob), "_blank");
            };
            container.appendChild(div);
          });
        } catch (err) { console.error(err); }
        stopLoading();
      });

      async function consultarMatriculas() {
        const cpf = document.getElementById('cpfInput').value;
        const token = 'Bearer '+ document.getElementById("tokenInput").value;
        console.log('Token:', token);
       // const url = `https://apionline.layoutsistemas.com.br/api/matriculas/?cpf=01264210213&entidade=796`;
        const url = `https://apionline.layoutsistemas.com.br/api/matriculas/?cpf=${cpf}&entidade=796`;
        const res = await axios.get(url, { headers: { Authorization: token } });
        const container = document.getElementById('matriculasContainer');
        container.innerHTML = '';
        res.data.results.sort((a, b) => b.matricula.localeCompare(a.matricula))
          .forEach(m => {
            const b = document.createElement('button');
            b.textContent = m.matricula;
            b.className = 'botaoMatriculas';
            b.onclick = () => document.getElementById('matriculaInput').value = m.matricula;
            container.appendChild(b);
          });
      }
async function consultaC() {
  showLoading();
  const cpf = document.getElementById("cpfInput").value;
  const token = 'Bearer '+ document.getElementById("tokenInput").value;

  try {
    const response = await fetch(
      `https://apionline.layoutsistemas.com.br/api/declaracao_rendimentos/relatorio/?declaracao_rendimento=916&cpf=${cpf}`,
      {
        method: "GET",
        headers: {
         
          
          authorization: `${token}`,
        },
      }
    );

    if (!response.ok) {
      throw new Error(`Erro na requisição: ${response.status} ${response.statusText}`);
    }

    const blob = await response.blob();
    const pdfBlob = new Blob([blob], { type: "application/pdf" });
    const url = window.URL.createObjectURL(pdfBlob);
    stopLoading();
    window.open(url, "_blank");
    

  } catch (error) {
    console.error("Erro ao consultar declaração:", error);
    alert(`Erro: ${error.message}`);
  }
}

    </script>

    <script>
  let funcionarios = [];

  // Busca a lista uma única vez ao carregar a página
  async function carregarFuncionarios() {
    try {
      const res = await fetch("https://siupa.com.br/siiupa/api/rh/api.php/records/tb_funcionario?include=nome,cpf&filter=status,eq,ativo&order=nome,asc");
      const data = await res.json();
      funcionarios = data.records;
    } catch (e) {
      console.error("Erro ao carregar funcionários:", e);
    }
  }
  carregarFuncionarios();

  const nomeInput = document.getElementById("nomeInput");
  const cpfInput = document.getElementById("cpfInput");
  const listaSugestoes = document.getElementById("listaSugestoes");

  nomeInput.addEventListener("input", () => {
    const termo = nomeInput.value.trim().toLowerCase();
    listaSugestoes.innerHTML = "";

    if (termo.length < 2) {
      listaSugestoes.style.display = "none";
      return;
    }

    const filtrados = funcionarios
      .filter(f => f.nome.toLowerCase().includes(termo))
      .slice(0, 8); // limita a 8 sugestões

    if (filtrados.length === 0) {
      listaSugestoes.style.display = "none";
      return;
    }

    filtrados.forEach(f => {
      const li = document.createElement("li");
      li.textContent = f.nome;
      li.style.padding = "6px 8px";
      li.style.cursor = "pointer";
      li.addEventListener("mouseenter", () => li.style.background = "#f0f0f0");
      li.addEventListener("mouseleave", () => li.style.background = "#fff");
      li.addEventListener("click", () => {
        nomeInput.value = f.nome;
  cpfInput.value = f.cpf.replace(/\D/g, ""); // remove tudo que não for número
        listaSugestoes.style.display = "none";
      });
      listaSugestoes.appendChild(li);
    });

    listaSugestoes.style.display = "block";
  });

  // Fecha a lista se clicar fora
  document.addEventListener("click", (e) => {
    if (!e.target.closest("#sugestoesContainer") && e.target !== nomeInput) {
      listaSugestoes.style.display = "none";
    }
  });
</script>

<script>
  function copiarComando() {
    const texto = document.getElementById('comandoCopiar').textContent;
    navigator.clipboard.writeText(texto)
      .then(() => {
        const btn = event.target;
        const original = btn.textContent;
        btn.textContent = '✅';
        setTimeout(() => btn.textContent = original, 1500);
      })
      .catch(err => console.error('Erro ao copiar:', err));
  }
</script>
